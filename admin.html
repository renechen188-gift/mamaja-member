<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>麻媽家 LINE 會員管理後台</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Noto Sans TC', sans-serif; background: #f5f5f5; min-height: 100vh; }
  .header { background: linear-gradient(135deg, #cc6600, #FF8200); color: white; padding: 20px; display: flex; justify-content: space-between; align-items: center; }
  .header h1 { font-size: 18px; }
  .header .logout { background: rgba(255,255,255,0.2); border: none; color: white; padding: 8px 15px; border-radius: 8px; cursor: pointer; font-size: 14px; }
  .stats-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; padding: 20px; }
  .stat-card { background: white; border-radius: 12px; padding: 20px; text-align: center; box-shadow: 0 2px 8px rgba(0,0,0,0.08); }
  .stat-card .num { font-size: 32px; font-weight: bold; color: #FF8200; }
  .stat-card .label { font-size: 12px; color: #999; margin-top: 5px; }
  .section { padding: 0 20px 20px; }
  .card { background: white; border-radius: 12px; padding: 20px; box-shadow: 0 2px 8px rgba(0,0,0,0.08); margin-bottom: 15px; }
  input, select { width: 100%; padding: 11px; border: 1px solid #ddd; border-radius: 8px; font-size: 14px; margin-bottom: 10px; }
  .btn { padding: 12px 20px; border: none; border-radius: 8px; font-size: 14px; cursor: pointer; color: white; width: 100%; margin-bottom: 8px; }
  .btn-primary { background: #FF8200; }
  .btn-success { background: #27ae60; }
  .tab { display: flex; background: white; border-radius: 10px; overflow: hidden; box-shadow: 0 2px 8px rgba(0,0,0,0.08); margin: 0 20px 20px; flex-wrap: wrap; }
  .tab-btn { flex: 1; min-width: 60px; padding: 12px 5px; border: none; background: white; cursor: pointer; font-size: 12px; text-align: center; }
  .tab-btn.active { background: #FF8200; color: white; }
  .member-row { display: flex; justify-content: space-between; align-items: center; padding: 12px 0; border-bottom: 1px solid #f0f0f0; }
  .member-row:last-child { border-bottom: none; }
  .member-row .info .name { font-size: 15px; font-weight: bold; }
  .member-row .info .detail { font-size: 12px; color: #999; margin-top: 3px; }
  .member-row .pts { font-size: 20px; font-weight: bold; color: #FF8200; }
  .store-row { display: flex; justify-content: space-between; padding: 12px 0; border-bottom: 1px solid #f0f0f0; }
  .store-row:last-child { border-bottom: none; }
  .login-wrap { max-width: 400px; margin: 80px auto; padding: 0 20px; }
  .btn-login { width: 100%; padding: 14px; background: #FF8200; color: white; border: none; border-radius: 8px; font-size: 16px; cursor: pointer; }
  .error { color: #e74c3c; text-align: center; margin-top: 10px; display: none; font-size: 14px; }
  .loading { text-align: center; padding: 30px; color: #999; }
  .result { padding: 15px; border-radius: 8px; margin-top: 10px; text-align: center; font-weight: bold; display: none; }
  .result.success { background: #d4edda; color: #155724; }
  .result.error { background: #f8d7da; color: #721c24; }
  .coupon-row { padding: 12px 0; border-bottom: 1px solid #f0f0f0; }
  .coupon-row:last-child { border-bottom: none; }
  .coupon-row .coupon-title { font-size: 14px; font-weight: bold; }
  .coupon-row .coupon-detail { font-size: 12px; color: #999; margin-top: 3px; }
  .badge { display: inline-block; padding: 2px 8px; border-radius: 10px; font-size: 11px; }
  .badge-active { background: #e8f5e9; color: #27ae60; }
  .badge-used { background: #f5f5f5; color: #999; }
  .badge-expired { background: #fce4ec; color: #e74c3c; }
</style>
</head>
<body>

<div id="app"><div class="loading">載入中...</div></div>

<script>
const API = 'https://mamaja-member-api.renechen188.workers.dev';
let currentTab = 'overview';

function showLogin() {
  document.getElementById('app').innerHTML = `
    <div style="background:linear-gradient(135deg,#cc6600,#FF8200);padding:40px 20px;text-align:center;color:white;">
      <h1 style="font-size:22px;">🍲 麻媽家</h1>
      <p style="opacity:0.8;margin-top:5px;">LINE 會員管理後台</p>
    </div>
    <div class="login-wrap">
      <div class="card">
        <h2 style="margin-bottom:20px;">管理員登入</h2>
        <input type="text" id="username" placeholder="帳號">
        <input type="password" id="password" placeholder="密碼">
        <button class="btn-login" onclick="login()">登入</button>
        <div class="error" id="err">帳號或密碼錯誤，或權限不足</div>
      </div>
    </div>
  `;
}

async function login() {
  const username = document.getElementById('username').value;
  const password = document.getElementById('password').value;
  const res = await fetch(`${API}/api/staff/login`, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ username, password })
  });
  const data = await res.json();
  if (data.success && data.staff.role === 'admin') {
    showAdmin();
  } else {
    document.getElementById('err').style.display = 'block';
  }
}

async function showAdmin() {
  document.getElementById('app').innerHTML = `
    <div class="header">
      <h1>🍲 麻媽家 LINE 會員管理後台</h1>
      <button class="logout" onclick="showLogin()">登出</button>
    </div>
    <div class="tab" style="margin-top:20px;">
      <button class="tab-btn active" onclick="switchTab('overview')" id="tab-overview">📊 總覽</button>
      <button class="tab-btn" onclick="switchTab('members')" id="tab-members">👥 會員</button>
      <button class="tab-btn" onclick="switchTab('send')" id="tab-send">🎫 發券</button>
      <button class="tab-btn" onclick="switchTab('coupons')" id="tab-coupons">📋 券紀錄</button>
      <button class="tab-btn" onclick="switchTab('search')" id="tab-search">🔍 查詢</button>
      <button class="tab-btn" onclick="switchTab('export')" id="tab-export">📤 匯出</button>
    </div>
    <div id="tab-content"></div>
  `;
  await loadOverview();
}

async function switchTab(tab) {
  currentTab = tab;
  ['overview','members','send','coupons','search','export'].forEach(t => {
    document.getElementById(`tab-${t}`).className = 'tab-btn' + (t === tab ? ' active' : '');
  });
  if (tab === 'overview') await loadOverview();
  if (tab === 'members') await loadMembers();
  if (tab === 'send') showSendCoupon();
  if (tab === 'coupons') await loadCoupons();
  if (tab === 'search') showSearch();
  if (tab === 'export') showExport();
}

async function loadOverview() {
  document.getElementById('tab-content').innerHTML = '<div class="loading">載入中...</div>';
  const res = await fetch(`${API}/api/admin/stats`);
  const data = await res.json();
  if (data.error) { document.getElementById('tab-content').innerHTML = '<div class="loading">載入失敗</div>'; return; }

  const storeHTML = data.stores.map(s => `
    <div class="store-row">
      <div>${s.store || '未知'}</div>
      <div style="font-weight:bold;color:#FF8200">${s.count} 人</div>
    </div>
  `).join('');

  document.getElementById('tab-content').innerHTML = `
    <div class="stats-grid">
      <div class="stat-card"><div class="num">${data.totalMembers}</div><div class="label">總會員數</div></div>
      <div class="stat-card"><div class="num">${data.totalPoints}</div><div class="label">總累積點數</div></div>
      <div class="stat-card"><div class="num">${data.activeCoupons}</div><div class="label">待使用優惠券</div></div>
      <div class="stat-card"><div class="num">NT$${data.usedCouponsAmount}</div><div class="label">已核銷折抵金額</div></div>
    </div>
    <div class="section">
      <h2 style="margin-bottom:12px;font-size:15px;font-weight:bold;">各門店會員數</h2>
      <div class="card">${storeHTML || '<p style="color:#999">尚無資料</p>'}</div>
    </div>
  `;
}

async function loadMembers() {
  document.getElementById('tab-content').innerHTML = '<div class="loading">載入中...</div>';
  const res = await fetch(`${API}/api/admin/members`);
  const data = await res.json();
  const members = data.members || [];

  const memberHTML = members.map(m => `
    <div class="member-row">
      <div class="info">
        <div class="name">${m.name || '未命名'}</div>
        <div class="detail">${m.phone || '未填手機'} ｜ ${new Date(m.created_at).toLocaleDateString('zh-TW')} 加入</div>
      </div>
      <div class="pts">${m.points}點</div>
    </div>
  `).join('');

  document.getElementById('tab-content').innerHTML = `
    <div class="section" style="padding-top:20px;">
      <div class="card">
        <h2 style="margin-bottom:15px;">所有會員（${members.length} 人）</h2>
        ${memberHTML || '<p style="color:#999;text-align:center;padding:20px;">尚無會員</p>'}
      </div>
    </div>
  `;
}

function showSendCoupon() {
  document.getElementById('tab-content').innerHTML = `
    <div class="section" style="padding-top:20px;">
      <div class="card">
        <h2 style="margin-bottom:15px;">🎫 發送優惠券</h2>
        <label style="font-size:13px;color:#666;display:block;margin-bottom:5px;">券名稱</label>
        <input type="text" id="c-title" placeholder="例：母親節感謝券">
        <label style="font-size:13px;color:#666;display:block;margin-bottom:5px;">說明</label>
        <input type="text" id="c-desc" placeholder="例：母親節專屬折扣，限堂食使用">
        <label style="font-size:13px;color:#666;display:block;margin-bottom:5px;">折抵金額（元）</label>
        <input type="number" id="c-discount" placeholder="例：50">
        <label style="font-size:13px;color:#666;display:block;margin-bottom:5px;">發送對象</label>
        <select id="c-target">
          <option value="all">全部會員</option>
        </select>
        <button class="btn btn-primary" onclick="sendCoupon()">🚀 發送優惠券</button>
        <div class="result" id="send-result"></div>
      </div>
    </div>
  `;
}

async function sendCoupon() {
  const title = document.getElementById('c-title').value;
  const desc = document.getElementById('c-desc').value;
  const discount = parseInt(document.getElementById('c-discount').value);
  const target = document.getElementById('c-target').value;

  if (!title) { alert('請輸入券名稱'); return; }
  if (!discount || discount <= 0) { alert('請輸入折抵金額'); return; }
  if (!confirm(`確定發送「${title}」給${target === 'all' ? '全部' : '指定'}會員？`)) return;

  const res = await fetch(`${API}/api/admin/send-coupon`, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ type: 'custom', title, description: desc, discount, target })
  });
  const data = await res.json();
  const el = document.getElementById('send-result');
  el.style.display = 'block';
  if (data.success) {
    el.className = 'result success';
    el.innerHTML = `✅ 成功發送給 ${data.sent} 位會員！`;
  } else {
    el.className = 'result error';
    el.innerHTML = `❌ 發送失敗：${data.error}`;
  }
}

async function loadCoupons() {
  document.getElementById('tab-content').innerHTML = '<div class="loading">載入中...</div>';
  const res = await fetch(`${API}/api/admin/coupons`);
  const data = await res.json();
  const coupons = data.coupons || [];

  const couponHTML = coupons.map(c => `
    <div class="coupon-row">
      <div style="display:flex;justify-content:space-between;align-items:flex-start;">
        <div>
          <div class="coupon-title">${c.title} <span style="color:#FF8200">NT$${c.discount}</span></div>
          <div class="coupon-detail">${c.name || '未命名'} ｜ ${c.phone || ''} ｜ 碼：${c.code}</div>
          <div class="coupon-detail">效期：${new Date(c.expires_at).toLocaleDateString('zh-TW')}</div>
          ${c.status === 'used' ? `<div class="coupon-detail">核銷：${new Date(c.used_at).toLocaleDateString('zh-TW')} ｜ ${c.used_store||''} ｜ ${c.used_by||''}</div>` : ''}
        </div>
        <span class="badge badge-${c.status}">${c.status === 'active' ? '未使用' : c.status === 'used' ? '已使用' : '已過期'}</span>
      </div>
    </div>
  `).join('');

  document.getElementById('tab-content').innerHTML = `
    <div class="section" style="padding-top:20px;">
      <div class="card">
        <h2 style="margin-bottom:15px;">優惠券紀錄（最近 100 筆）</h2>
        ${couponHTML || '<p style="color:#999;text-align:center;padding:20px;">尚無紀錄</p>'}
      </div>
    </div>
  `;
}

function showSearch() {
  document.getElementById('tab-content').innerHTML = `
    <div class="section" style="padding-top:20px;">
      <div class="card">
        <h2 style="margin-bottom:15px;">查詢會員</h2>
        <input type="tel" id="search-phone" placeholder="輸入手機號碼">
        <button class="btn btn-primary" onclick="searchMember()">查詢</button>
      </div>
      <div id="search-result"></div>
    </div>
  `;
}

async function searchMember() {
  const phone = document.getElementById('search-phone').value;
  if (!phone) return;
  const res = await fetch(`${API}/api/member/by-phone?phone=${phone}`);
  const data = await res.json();
  
  if (data.error) {
    document.getElementById('search-result').innerHTML = `<div class="card" style="text-align:center;color:#e74c3c">找不到此會員</div>`;
    return;
  }

  const txHTML = data.transactions.map(t => `
    <div style="display:flex;justify-content:space-between;padding:10px 0;border-bottom:1px solid #f0f0f0;">
      <div>
        <div style="font-size:12px;color:#999">${new Date(t.created_at).toLocaleDateString('zh-TW')} ｜ ${t.store||''}</div>
        <div style="font-size:14px">${t.type==='add'?`消費 NT$${t.amount}`:`兌換：${t.note||''}`}</div>
      </div>
      <div style="font-weight:bold;color:${t.type==='add'?'#27ae60':'#e74c3c'}">${t.type==='add'?'+':''}${t.points}點</div>
    </div>
  `).join('');

  const couponHTML = (data.coupons || []).map(c => `
    <div style="display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid #f0f0f0;">
      <div style="font-size:13px;">${c.title} ｜ NT$${c.discount} ｜ 碼：${c.code}</div>
      <span class="badge badge-${c.status}">${c.status==='active'?'未使用':c.status==='used'?'已使用':'已過期'}</span>
    </div>
  `).join('');

  document.getElementById('search-result').innerHTML = `
    <div class="card">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:15px;">
        <div>
          <div style="font-size:18px;font-weight:bold">${data.member.name||'未命名'}</div>
          <div style="font-size:13px;color:#999">${data.member.phone||''}</div>
        </div>
        <div style="font-size:28px;font-weight:bold;color:#FF8200">${data.member.points}點</div>
      </div>
      <h2 style="font-size:14px;margin-bottom:10px;">優惠券</h2>
      ${couponHTML || '<p style="color:#999;font-size:13px;">無優惠券</p>'}
      <h2 style="font-size:14px;margin:15px 0 10px;">消費紀錄</h2>
      ${txHTML || '<p style="color:#999;font-size:13px;">尚無紀錄</p>'}
    </div>
  `;
}

function showExport() {
  document.getElementById('tab-content').innerHTML = `
    <div class="section" style="padding-top:20px;">
      <div class="card">
        <h2 style="margin-bottom:15px;">匯出資料</h2>
        <button class="btn btn-success" onclick="exportMembers()">📥 匯出會員名單 CSV</button>
        <button class="btn btn-primary" onclick="exportCoupons()">📥 匯出優惠券紀錄 CSV</button>
      </div>
    </div>
  `;
}

async function exportMembers() {
  const res = await fetch(`${API}/api/admin/members`);
  const data = await res.json();
  const members = data.members || [];
  const csv = [
    ['姓名','手機','點數','加入日期'].join(','),
    ...members.map(m => [m.name||'',m.phone||'',m.points,new Date(m.created_at).toLocaleDateString('zh-TW')].join(','))
  ].join('\n');
  downloadCSV(csv, `麻媽家會員_${today()}.csv`);
}

async function exportCoupons() {
  const res = await fetch(`${API}/api/admin/coupons`);
  const data = await res.json();
  const coupons = data.coupons || [];
  const csv = [
    ['會員','手機','券名稱','折抵金額','核銷碼','狀態','到期日','核銷時間','核銷門店'].join(','),
    ...coupons.map(c => [
      c.name||'',c.phone||'',c.title,c.discount,c.code,
      c.status==='active'?'未使用':c.status==='used'?'已使用':'已過期',
      new Date(c.expires_at).toLocaleDateString('zh-TW'),
      c.used_at?new Date(c.used_at).toLocaleDateString('zh-TW'):'',
      c.used_store||''
    ].join(','))
  ].join('\n');
  downloadCSV(csv, `麻媽家優惠券_${today()}.csv`);
}

function downloadCSV(csv, filename) {
  const blob = new Blob(['\uFEFF' + csv], { type: 'text/csv;charset=utf-8;' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = filename; a.click();
}

function today() {
  return new Date().toLocaleDateString('zh-TW').replace(/\//g, '-');
}

showLogin();
</script>
</body>
</html>
